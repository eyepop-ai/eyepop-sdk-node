<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Multi-Image Group Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="main.css" rel="stylesheet">

<!--    <script src="https://cdn.jsdelivr.net/npm/@eyepop.ai/eyepop/dist/eyepop.min.js"></script>-->
    <script src="/src/eyepop/dist/eyepop.min.js"></script>
    <script src="env.js"></script> <!-- apiKey, defaultAccountUUID -->
    <script src="multi_image_group.js"></script>
</head>

<body>
    <div class="container">
        <!-- HEADER: Full width, Logo Image -->
        <header class="mt-4">
            <div class="container-fluid d-flex align-items-center">

                <img src="images/eyepop-logo.svg" alt="EyePop.ai Logo" class="p-2" style="height: 70px;"/>
                <h1 class="p-2">Multi-Image Group Demo: <span id="pop-name">...</span></h1>
                <span id="connection-status" class="badge text-bg-secondary">Disconnected</span>

            </div>
        </header>

        <!-- FORM ELEMENTS: Centered, Full Width Row -->
        <div class="container-fluid mt-4">
            <div class="d-flex justify-content-md-end">
                <input type="text" class="m-2 form-control" id="ability" placeholder="ability" value="eyepop.vlm.image:latest">
                <button disabled class="m-2 col form-control" id="connect">Connect</button>
                <input disabled type="file" class="m-2 form-control" id="file-upload" multiple accept="image/*">
                <button disabled class="m-2 col form-control" id="process">Process Group</button>
            </div>
        </div>

        <div class="container-fluid mt-4">
            <div class="row">
                <div class="col-md-12">
                    Selected files (need at least two): <span id="file-list" class="text-muted">none</span>
                </div>
            </div>
        </div>

        <div class="container-fluid mt-4">
            <div class="row">
                <div class="col-md-12 d-flex">
                    EyePop.ai Result: <h3 id="timing" class="ms-auto">0ms</h3>
                </div>
            </div>
            <div class="row">
                <div class="col-md-12">
                    <pre id="txt_json"
                        class="form-control h-100"><span class="text-muted">{<br/> ...JSON Will appear Here...<br/>}</span></pre>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
