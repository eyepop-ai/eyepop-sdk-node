# Publishes a canary build of every workspace package to npm under the `dev` dist-tag.
# Triggered manually via the Actions tab; nothing fires on push. Versions are stamped as
# `<current>-dev.<short-sha>` so `latest` stays pinned to real releases.

name: Publish canary to npm

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - name: Stamp canary versions
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          for pkg_dir in src/eyepop src/eyepop-render-2d src/react-native-eyepop; do
            CURRENT=$(node -p "require('./${pkg_dir}/package.json').version")
            NEW="${CURRENT}-dev.${SHORT_SHA}"
            echo "${pkg_dir}: ${CURRENT} -> ${NEW}"
            npm version "${NEW}" --no-git-tag-version --prefix "${pkg_dir}"
          done
      - run: npm run build --workspaces
      - run: npm publish --workspaces --tag dev --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
