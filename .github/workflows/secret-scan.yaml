name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@v3.95.9
        with:
          extra_args: >-
            --config=.github/trufflehog/eyepop-detectors.yml
            --results=verified,unknown
