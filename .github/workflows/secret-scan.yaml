name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: eyepop-ai/eyepop-actions/secret-scan@main
